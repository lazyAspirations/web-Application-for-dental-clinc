    <div class="container">
        <!--Data or Content-->
        <div class="box-1">
            <div class="content-holder">
                <h2>Bienvenue!</h2>
               
                <button class="button-1" onclick="signup()">Sign up</button>
                <button id="loginb" class="button-2" onclick="login()">Login</button>
            </div>

        <!--Forms-->
        <div class="box-2">
            <div class="login-form-container">
                <h1>Login Form</h1>
                <input id="nom" type="text" placeholder="Nom" class="input-field">
                <br><br>
                <input id="prenom" type="password" placeholder="Mot de passe" class="input-field">
                <br><br>
                <button id="loginb" class="login-button" type="button">Login</button>
            </div>
  
  
  <!--Create Container for Signup form-->
        <div class="signup-form-container">
            <h1>Sign Up Form</h1>
            <input type="text" placeholder="Nom" class="input-field">
            <br><br>
            <input type="password" placeholder="Mot de passe" class="input-field">
            <br><br>
            <select name="profile" placeholder="Profile" size=1>
                <option value="client">client</option>
                <option value="medecin">medecin</option>
                <option value="secretaire">secraitere</option>
            </select>
            <br><br>
            <button id="loginb" class="signup-button" type="button">Sign Up</button>

            <script>
                function login() {
                    // هنا يمكنك إضافة منطق التحقق من بيانات تسجيل الدخول
                    // إذا كانت بيانات تسجيل الدخول صحيحة، قم بتحديث حالة تسجيل الدخول
                    localStorage.setItem('isLoggedIn', 'true'); // تخزين حالة تسجيل الدخول في localStorage
                    window.location.href = 'appointment.html'; // الانتقال إلى صفحة المواعيد
                }
            
                function signup() {
                    // منطق التسجيل
                    localStorage.setItem('isLoggedIn', 'true'); // تخزين حالة تسجيل الدخول في localStorage
                    window.location.href = 'appointment.html'; // الانتقال إلى صفحة المواعيد
                }
            </script>
